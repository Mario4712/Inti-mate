name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: intimare
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: intimare_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @intimare/database db:generate

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Unit tests
        env:
          DATABASE_URL: postgresql://intimare:secret@localhost:5432/intimare_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test_secret_32_chars_minimum_ok!!
          JWT_REFRESH_SECRET: test_refresh_secret_32_chars_ok!!
          CPF_ENCRYPTION_KEY: test_cpf_key_32_chars_minimum_ok!
          ELASTICSEARCH_URL: http://localhost:9200
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          S3_BUCKET_MEDIA: media
          S3_BUCKET_KYC: kyc-documents
          LIVEKIT_API_KEY: devkey
          LIVEKIT_API_SECRET: devsecret
          NODE_ENV: test
        run: pnpm --filter @intimare/api test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @intimare/database db:generate

      - name: Build API
        run: pnpm --filter @intimare/api build

      - name: Build Web
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3001' }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
          NEXT_PUBLIC_LIVEKIT_HOST: ${{ vars.NEXT_PUBLIC_LIVEKIT_HOST || 'ws://localhost:7880' }}
        run: pnpm --filter @intimare/web build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: |
          docker build -f apps/api/Dockerfile -t intimare-api:${{ github.sha }} .

      - name: Build Web Docker image
        run: |
          docker build -f apps/web/Dockerfile -t intimare-web:${{ github.sha }} \
            --build-arg DOCKER_BUILD=1 \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3001' }} .
